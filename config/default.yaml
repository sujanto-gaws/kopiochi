server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  read_header_timeout: "10s"
  write_timeout: "30s"
  idle_timeout: "120s"
  shutdown_timeout: "30s"
  request_timeout: "60s"

db:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  name: "kopiochi"
  sslmode: "disable"
  max_conns: 10
  min_conns: 2

log:
  level: "info"
  format: "json"

# Auth / JWT configuration
auth:
  private_key_path: "keys/private.pem"
  public_key_path: "keys/public.pem"
  issuer: "kopiochi"
  client_id: "kopiochi"
  access_token_ttl: "15m"
  refresh_token_ttl: "168h"   # 7 days
  mfa_temporary_ttl: "5m"
  max_failed_attempts: 5
  lock_duration: "15m"

# Plugin Configuration
plugins:
  # Middleware plugins (applied in order)
  middleware:
    - cors
    - ratelimit
  
  # Authentication plugins
  auth:
    jwt:
      enabled: false
      provider: jwt-auth
      config:
        secret: "your-secret-key-change-in-production"
        expiry: "24h"
        issuer: "kopiochi"
  
  # Cache plugins
  cache:
    redis:
      enabled: false
      provider: redis
      config:
        host: "localhost"
        port: 6379
        password: ""
        db: 0
  
  # Custom plugins
  custom: {}