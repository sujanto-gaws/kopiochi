server:
  host: "0.0.0.0"
  port: 8080

db:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  name: "kopiochi"
  sslmode: "disable"
  max_conns: 10
  min_conns: 2

log:
  level: "info"
  format: "json"

# Plugin Configuration
plugins:
  # Middleware plugins (applied in order)
  middleware:
    - cors
    - ratelimit
  
  # Authentication plugins
  auth:
    jwt:
      enabled: false
      provider: jwt-auth
      config:
        secret: "your-secret-key-change-in-production"
        expiry: "24h"
        issuer: "kopiochi"
  
  # Cache plugins
  cache:
    redis:
      enabled: false
      provider: redis
      config:
        host: "localhost"
        port: 6379
        password: ""
        db: 0
  
  # Custom plugins
  custom: {}